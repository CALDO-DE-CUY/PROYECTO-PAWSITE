
<!--Pagina de inicio de sesion y registro RESCATISTA O CEDENTE-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Cedente/Rescatista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cafe: {
                            50: '#fdfbd7',
                            100: '#fbf7c0',
                            200: '#f5ea89',
                            600: '#8A5A36', // Café medio / terracota
                            700: '#6E472A', // Café cálido
                            800: '#51331E', // Café oscuro
                            900: '#362214', // Café profundo chocolate
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl border border-stone-200 shadow-xl max-w-md w-full transition-all">
        
        <!--  PANEL DE INICIO DE SESIÓN  -->
        <div id="login-panel" class="space-y-6">
            <div class="text-center">
                <div class="inline-flex p-3 bg-amber-50 rounded-full text-cafe-700 mb-2">
                    <i class="fa-solid fa-paw text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-cafe-900">¡Bienvenido de vuelta!</h1>
                <p class="text-stone-500 text-sm mt-1">Ingresa a tu cuenta de rescatista</p>
            </div>

            <form onsubmit="validateAndAuth(event, 'login-panel')" class="space-y-4" novalidate>
                <div>
                    <label class="block text-xs font-semibold text-cafe-700 uppercase mb-2">Correo Electrónico</label>
                    <input type="email" oninput="resetStyle(this)" class="w-full px-4 py-3 rounded-xl border border-stone-200 text-sm focus:outline-none focus:border-cafe-600 focus:ring-1 focus:ring-cafe-600 transition-all bg-stone-50/50" placeholder="correo@ejemplo.com">
                </div>
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-xs font-semibold text-cafe-700 uppercase">Contraseña</label>
                        <button type="button" onclick="switchPanel('forgot')" class="text-xs text-stone-500 hover:text-cafe-700 transition-all font-medium">¿La olvidaste?</button>
                    </div>
                    <input type="password" oninput="resetStyle(this)" class="w-full px-4 py-3 rounded-xl border border-stone-200 text-sm focus:outline-none focus:border-cafe-600 focus:ring-1 focus:ring-cafe-600 transition-all bg-stone-50/50" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-cafe-800 hover:bg-cafe-900 text-white font-semibold py-3.5 rounded-xl transition-all text-sm shadow-md mt-2 shadow-cafe-900/10">
                    Iniciar Sesión
                </button>



            </form>

            <div class="text-center text-sm text-stone-600 pt-4 border-t border-stone-100">
                ¿No tienes una cuenta? 
                <button onclick="switchPanel('register')" class="font-semibold text-cafe-700 hover:text-cafe-900 hover:underline">Regístrate aquí</button>
            </div>
        </div>

        <!-- PANEL DE REGISTRO -->
        <div id="register-panel" class="space-y-6 hidden">
            <div class="text-center">
                <div class="inline-flex p-3 bg-amber-50 rounded-full text-cafe-700 mb-2">
                    <i class="fa-solid fa-heart text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-cafe-900">Crea tu cuenta</h1>
                <p class="text-stone-500 text-sm mt-1">Únete para ayudar a más patitas</p>
            </div>

            <form onsubmit="validateAndAuth(event, 'register-panel')" class="space-y-4" novalidate>
                <div>
                    <label class="block text-xs font-semibold text-cafe-700 uppercase mb-2">Nombre Completo / Fundación</label>
                    <input type="text" oninput="resetStyle(this)" class="w-full px-4 py-3 rounded-xl border border-stone-200 text-sm focus:outline-none focus:border-cafe-600 focus:ring-1 focus:ring-cafe-600 transition-all bg-stone-50/50" placeholder="Juan Pérez o Refugio Patitas">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-cafe-700 uppercase mb-2">Correo Electrónico</label>
                    <input type="email" oninput="resetStyle(this)" class="w-full px-4 py-3 rounded-xl border border-stone-200 text-sm focus:outline-none focus:border-cafe-600 focus:ring-1 focus:ring-cafe-600 transition-all bg-stone-50/50" placeholder="correo@ejemplo.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-cafe-700 uppercase mb-2">Contraseña</label>
                    <input type="password" oninput="resetStyle(this)" class="w-full px-4 py-3 rounded-xl border border-stone-200 text-sm focus:outline-none focus:border-cafe-600 focus:ring-1 focus:ring-cafe-600 transition-all bg-stone-50/50" placeholder="Mínimo 8 caracteres">
                </div>
                <button type="submit" class="w-full bg-cafe-800 hover:bg-cafe-900 text-white font-semibold py-3.5 rounded-xl transition-all text-sm shadow-md mt-2 shadow-cafe-900/10">
                    Crear Cuenta
                </button>
            </form>

            <div class="text-center text-sm text-stone-600 pt-4 border-t border-stone-100">
                ¿Ya tienes cuenta? 
                <button onclick="switchPanel('login')" class="font-semibold text-cafe-700 hover:text-cafe-900 hover:underline">Inicia sesión</button>
            </div>
        </div>

        <!-- PANEL DE RECUPERAR CONTRASEÑA -->
        <div id="forgot-panel" class="space-y-6 hidden">
            <div class="text-center">
                <div class="inline-flex p-3 bg-amber-50 rounded-full text-cafe-700 mb-2">
                    <i class="fa-solid fa-key text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-cafe-900">Recuperar contraseña</h1>
                <p class="text-stone-500 text-sm mt-1">Te enviaremos las instrucciones por correo</p>
            </div>

            <form onsubmit="validateAndForgot(event, 'forgot-panel')" class="space-y-4" novalidate>
                <div>
                    <label class="block text-xs font-semibold text-cafe-700 uppercase mb-2">Correo Electrónico registrado</label>
                    <input type="email" oninput="resetStyle(this)" class="w-full px-4 py-3 rounded-xl border border-stone-200 text-sm focus:outline-none focus:border-cafe-600 focus:ring-1 focus:ring-cafe-600 transition-all bg-stone-50/50" placeholder="correo@ejemplo.com">
                </div>
                <button type="submit" class="w-full bg-cafe-800 hover:bg-cafe-900 text-white font-semibold py-3.5 rounded-xl transition-all text-sm shadow-md mt-2 shadow-cafe-900/10">
                    Enviar enlace de recuperación
                </button>
            </form>

            <div class="text-center text-sm text-stone-600 pt-4 border-t border-stone-100">
                <button onclick="switchPanel('login')" class="font-semibold text-cafe-700 hover:text-cafe-900 hover:underline flex items-center justify-center w-full">
                    <i class="fa-solid fa-arrow-left text-xs mr-2"></i> Volver al inicio de sesión
                </button>
            </div>
        </div>

    </div>

    <script>
        function switchPanel(panel) {
            // Limpiar bordes rojos de cualquier panel antes de cambiar
            document.querySelectorAll('input').forEach(input => resetStyle(input));

            document.getElementById('login-panel').classList.add('hidden');
            document.getElementById('register-panel').classList.add('hidden');
            document.getElementById('forgot-panel').classList.add('hidden');

            document.getElementById(`${panel}-panel`).classList.remove('hidden');
        }

        // Valida Login y Registro sin alertas ni mensajes nativos
        function validateAndAuth(event, panelId) {
            event.preventDefault();
            const panel = document.getElementById(panelId);
            const inputs = panel.querySelectorAll('input');
            let isValid = true;

            inputs.forEach(input => {
                if (!input.value.trim()) {
                    input.classList.remove('border-stone-200', 'focus:border-cafe-600', 'focus:ring-cafe-600');
                    input.classList.add('border-red-500', 'focus:border-red-500', 'focus:ring-red-500');
                    isValid = false;
                }
            });

            if (isValid) {
                window.location.href = 'dashboard.html';
            }
        }

        // Valida la recuperación de contraseña
        function validateAndForgot(event, panelId) {
            event.preventDefault();
            const panel = document.getElementById(panelId);
            const input = panel.querySelector('input');

            if (!input.value.trim()) {
                input.classList.remove('border-stone-200', 'focus:border-cafe-600', 'focus:ring-cafe-600');
                input.classList.add('border-red-500', 'focus:border-red-500', 'focus:ring-red-500');
            } else {
                switchPanel('login');
            }
        }

        // Quita el borde rojo en tiempo real cuando el usuario escribe algo
        function resetStyle(input) {
            input.classList.remove('border-red-500', 'focus:border-red-500', 'focus:ring-red-500');
            input.classList.add('border-stone-200', 'focus:border-cafe-600', 'focus:ring-cafe-600');
        }
    </script>
</body>
</html>
