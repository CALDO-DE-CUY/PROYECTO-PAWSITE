<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Rescatista - Registro PawSite</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        latte: {
                            50: '#FDFBF7',  // Fondo crema suave
                            100: '#F4EFE6', // Arena claro
                            200: '#E6DCC8', // Beige
                        },
                        cafe: {
                            600: '#A07855', // Avellana
                            700: '#8A5A36', // Terracota
                            800: '#51331E', // Chocolate
                            900: '#362214', // Café profundo
                        }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-latte-50 font-sans min-h-screen flex flex-col justify-between">

    <!-- ================= NAVBAR PERMANENTE Y ALINEADO ================= -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-latte-100 px-6 py-3 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            
            <!-- Extremo Izquierdo: Logo -->
            <div class="flex-1 flex justify-start">
                <a href="ini.html" class="flex items-center gap-2.5 group">
                    <div class="w-9 h-9 bg-amber-100 text-cafe-700 rounded-xl flex items-center justify-center text-base shadow-sm group-hover:bg-cafe-800 group-hover:text-white transition-all duration-300">
                        <i class="fa-solid fa-paw"></i>
                    </div>
                    <span class="text-lg font-bold text-cafe-900 tracking-tight">Paw<span class="text-cafe-600 font-medium">Site</span></span>
                </a>
            </div>

            <!-- Extremo Derecho: Notificaciones y Perfil -->
            <div class="flex-1 flex justify-end items-center gap-4">
                <button class="text-stone-400 hover:text-cafe-700 transition-colors p-2 relative group/bell" title="Notificaciones">
                    <i class="fa-solid fa-bell text-lg"></i>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-cafe-700 rounded-full border border-white"></span>
                </button>

                <button onclick="window.location.href='perfil.html'" class="flex items-center justify-center w-10 h-10 rounded-full bg-amber-50 hover:bg-amber-100 text-cafe-700 border border-amber-200/60 transition-all active:scale-95 focus:outline-none shadow-sm" title="Mi Perfil">
                <i class="fa-solid fa-user text-base"></i>
            </button>
            </div>

        </div>
    </nav>

    <!-- ================= CONTENIDO PRINCIPAL ================= -->
    <main class="flex-1 max-w-4xl mx-auto w-full px-6 py-10">
        
        <!-- Encabezado de la Sección -->
        <div class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-stone-200/60 pb-6">
            <div>
                <span class="text-xs font-bold text-cafe-600 uppercase tracking-wider">Espacio de Registro</span>
                <h1 class="text-3xl font-black text-cafe-900 mt-0.5">Ingresar Nuevo Integrante</h1>
                <p class="text-stone-500 text-sm mt-0.5">Completa la ficha técnica para dar de alta al animalito en la plataforma de adopción.</p>
            </div>
            <a href="Adoptante.html" class="px-4 py-2 text-xs font-bold uppercase tracking-wide text-stone-600 bg-white border border-stone-200 hover:bg-stone-50 rounded-xl transition-all shadow-sm">
                <i class="fa-solid fa-arrow-left mr-1.5"></i> Cancelar
            </a>
        </div>

        <!-- Formulario de Registro Principal -->
        <form onsubmit="handleRegister(event)" class="space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                
                <!-- Columna Izquierda: Carga de Imagen (Estilo moderno) -->
                <div class="md:col-span-1 space-y-4">
                    <label class="block text-xs font-bold text-cafe-900 uppercase tracking-wide">Fotografía Oficial</label>
                    
                    <div class="border-2 border-dashed border-stone-300 hover:border-cafe-600 bg-white rounded-2xl p-6 text-center cursor-pointer transition-colors relative group h-64 flex flex-col justify-center items-center">
                        <input type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" id="pet-photo" onchange="previewImage(this)">
                        
                        <!-- Estado inicial del cargador -->
                        <div id="upload-placeholder" class="space-y-2">
                            <div class="w-12 h-12 bg-amber-50 text-cafe-700 rounded-full flex items-center justify-center text-lg mx-auto group-hover:scale-110 transition-transform">
                                <i class="fa-solid fa-cloud-arrow-up"></i>
                            </div>
                            <p class="text-xs font-semibold text-stone-700">Arrastra o sube una imagen</p>
                            <p class="text-[10px] text-stone-400">JPG, PNG hasta 5MB</p>
                        </div>

                        <!-- Miniatura de previsualización oculta inicialmente -->
                        <img id="image-preview" src="#" alt="Previsualización" class="hidden absolute inset-0 w-full h-full object-cover rounded-2xl">
                    </div>
                </div>

                <!-- Columna Derecha: Datos Generales -->
                <div class="md:col-span-2 bg-white p-6 md:p-8 rounded-3xl border border-stone-200/80 shadow-sm space-y-6">
                    
                    <h3 class="text-sm font-black text-cafe-900 uppercase tracking-wider border-b border-stone-100 pb-2"><i class="fa-solid fa-id-card text-cafe-600 mr-2"></i> Datos Básicos</h3>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-stone-600 uppercase mb-1.5">Nombre del animalito</label>
                            <input type="text" required class="w-full px-4 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:border-cafe-600 bg-stone-50/40" placeholder="Ej: Chester">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-stone-600 uppercase mb-1.5">Especie</label>
                            <select class="w-full px-4 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:border-cafe-600 bg-white">
                                <option>🐶 Perro</option>
                                <option>🐱 Gato</option>
                                <option>🐰 Otro</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-stone-600 uppercase mb-1.5">Raza / Cruce</label>
                            <input type="text" class="w-full px-4 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:border-cafe-600 bg-stone-50/40" placeholder="Ej: Mestizo, Siames, etc.">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-stone-600 uppercase mb-1.5">Edad Estimada</label>
                            <input type="text" required class="w-full px-4 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:border-cafe-600 bg-stone-50/40" placeholder="Ej: 6 meses, 2 años">
                        </div>
                    </div>

                    <!-- Fila de estado médico -->
                    <h3 class="text-sm font-black text-cafe-900 uppercase tracking-wider border-b border-stone-100 pb-2 pt-2"><i class="fa-solid fa-heart-pulse text-cafe-600 mr-2"></i> Estado de Salud</h3>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-stone-200 bg-stone-50/40 cursor-pointer hover:bg-stone-50">
                            <input type="checkbox" class="accent-cafe-700 h-4 w-4">
                            <span class="text-xs font-medium text-stone-700">Vacunado/a</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-stone-200 bg-stone-50/40 cursor-pointer hover:bg-stone-50">
                            <input type="checkbox" class="accent-cafe-700 h-4 w-4">
                            <span class="text-xs font-medium text-stone-700">Esterilizado/a</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-stone-200 bg-stone-50/40 cursor-pointer hover:bg-stone-50">
                            <input type="checkbox" class="accent-cafe-700 h-4 w-4">
                            <span class="text-xs font-medium text-stone-700">Desparasitado/a</span>
                        </label>
                    </div>

                    <!-- Historia y temperamento -->
                    <div class="space-y-1.5">
                        <label class="block text-xs font-semibold text-stone-600 uppercase">Historia y Personalidad</label>
                        <textarea rows="4" required class="w-full px-4 py-3 rounded-xl border border-stone-200 text-sm focus:outline-none focus:border-cafe-600 bg-stone-50/40" placeholder="Describe brevemente de dónde fue rescatado, cómo se comporta con otros animales o niños, y qué tipo de hogar necesita..."></textarea>
                    </div>

                </div>
            </div>

            <!-- Botones de Acción Inferiores -->
            <div class="flex justify-end gap-4 max-w-6xl mx-auto pt-4">
                <button type="button" onclick="window.location.href='Adoptante.html'" class="px-6 py-3 rounded-xl text-sm font-semibold text-stone-600 bg-stone-200/60 hover:bg-stone-200 transition-colors">
                    Descartar Cambios
                </button>
                <button type="submit" class="px-8 py-3 rounded-xl text-sm font-semibold text-white bg-cafe-800 hover:bg-cafe-900 shadow-md shadow-cafe-900/10 transition-colors">
                    Publicar en la Plataforma
                </button>
            </div>

        </form>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="bg-white border-t border-latte-100 py-6 w-full mt-12">
        <div class="max-w-6xl mx-auto px-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <p class="text-xs text-stone-500 text-center sm:text-left">
                &copy; 2026 PAW SITE. Hecho con <i class="fa-solid fa-heart text-amber-600"></i> para los animales.</p>
            
            
            <!-- Redes Sociales -->
                       <div class="flex gap-4">
                <div class="flex items-center gap-5 text-xl text-pet-500"> 
                    <!-- Enlace a Instagram -->
<a href="https://www.instagram.com/pawsite2026?igsh=a2F4ZDl3NGRianlm" target="_blank" rel="noopener noreferrer" class="hover:text-pet-600 transition-colors">
    <i class="fa-brands fa-instagram"></i>
</a> 

<!-- Enlace a Facebook -->
<a href="https://www.facebook.com/profile.php?id=61590693212306&rdid=WJ3HdioJNlmnoJ4v&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F1Tot5ztaeW%2F#" target="_blank" rel="noopener noreferrer" class="hover:text-pet-600 transition-colors">
    <i class="fa-brands fa-facebook"></i>
</a>

<!-- Enlace a Twitter / X -->
<a href="https://x.com/PawSite2026" target="_blank" rel="noopener noreferrer" class="hover:text-pet-600 transition-colors">
    <i class="fa-brands fa-twitter"></i>
</a>
       
            </div>
        </div>
    </footer>

    <!-- Lógica de Interactividad -->
    <script>

        
        // Muestra una miniatura real de la imagen cuando el rescatista la sube
        function previewImage(input) {
            const preview = document.getElementById('image-preview');
            const placeholder = document.getElementById('upload-placeholder');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                }
                
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Simulación de envío del formulario
        function handleRegister(event) {
            event.preventDefault();
            alert('¡Excelente trabajo! El peludito ha sido registrado exitosamente y ya está visible en el catálogo público.');
            window.location.href = 'ini.html';
        }
    </script>

</body>
</html>
